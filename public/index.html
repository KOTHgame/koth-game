<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="theme-color" content="#050810">
<title>👑 KOTH</title>

<script src="/socket.io/socket.io.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box;margin:0;padding:0;}

:root{
  --bg:#050810;
  --card:rgba(255,255,255,0.05);
  --border:rgba(255,255,255,.08);
  --gold:#f5c518;
  --blue:#3b82f6;
  --purple:#a855f7;
  --text:#f1f5f9;
  --r:18px;
}

body{
  font-family:'DM Sans',sans-serif;
  color:var(--text);
  min-height:100vh;
  background: radial-gradient(circle at 20% 20%, #1a1f3a, transparent),
              radial-gradient(circle at 80% 80%, #2a1240, transparent),
              #050810;
  overflow-x:hidden;
}

/* ---------- GLOBAL ANIMATION ---------- */
.fade-in{
  animation:fadeIn .6s ease forwards;
}
@keyframes fadeIn{
  from{opacity:0;transform:translateY(20px) scale(.98);}
  to{opacity:1;transform:translateY(0) scale(1);}
}

/* ---------- TITLE ---------- */
.title{
  font-family:'Bebas Neue';
  font-size:60px;
  letter-spacing:3px;
  text-align:center;
  margin-top:40px;
  background:linear-gradient(90deg,var(--gold),#fff,var(--gold));
  -webkit-background-clip:text;
  color:transparent;
  animation:glow 3s infinite linear;
}

@keyframes glow{
  0%{filter:brightness(1);}
  50%{filter:brightness(1.6);}
  100%{filter:brightness(1);}
}

/* ---------- BUTTON ---------- */
.btn{
  padding:14px 22px;
  border-radius:12px;
  border:none;
  cursor:pointer;
  font-weight:600;
  font-size:16px;
  background:linear-gradient(135deg,var(--blue),var(--purple));
  color:white;
  transition:.25s;
  box-shadow:0 0 20px rgba(59,130,246,.4);
}

.btn:hover{
  transform:translateY(-2px) scale(1.03);
  box-shadow:0 0 30px rgba(168,85,247,.7);
}

/* ---------- CARD ---------- */
.card{
  background:var(--card);
  backdrop-filter:blur(14px);
  border:1px solid var(--border);
  border-radius:var(--r);
  padding:20px;
  box-shadow:0 0 30px rgba(0,0,0,.4);
  transition:.3s;
}

.card:hover{
  transform:translateY(-4px) scale(1.02);
}

/* ---------- LOBBY ---------- */
.lobby{
  max-width:500px;
  margin:40px auto;
  display:flex;
  flex-direction:column;
  gap:20px;
}

.player{
  padding:14px;
  border-radius:12px;
  background:rgba(255,255,255,0.06);
  display:flex;
  justify-content:space-between;
  align-items:center;
  transition:.2s;
}

.player:hover{
  background:rgba(255,255,255,0.12);
}

/* ---------- INPUT ---------- */
input{
  padding:14px;
  border-radius:10px;
  border:none;
  outline:none;
  width:100%;
  background:rgba(255,255,255,.08);
  color:white;
  font-size:16px;
}

/* ---------- START SCREEN ---------- */
.start{
  text-align:center;
  padding:40px 20px;
}

.start-box{
  max-width:420px;
  margin:40px auto;
  display:flex;
  flex-direction:column;
  gap:15px;
}

/* ---------- CHAOS EFFECT ---------- */
.chaos-bg{
  position:fixed;
  inset:0;
  pointer-events:none;
  overflow:hidden;
}

.chaos-bg span{
  position:absolute;
  font-size:24px;
  opacity:.08;
  animation:float 10s linear infinite;
}

@keyframes float{
  from{transform:translateY(100vh) rotate(0deg);}
  to{transform:translateY(-20vh) rotate(360deg);}
}
</style>
</head>

<body>

<div class="chaos-bg">
  <span style="left:10%">?</span>
  <span style="left:30%">+1</span>
  <span style="left:60%">🎯</span>
  <span style="left:80%">?</span>
</div>

<div class="start fade-in">

  <div class="title">KOTH 👑</div>

  <div class="start-box card">
    <input placeholder="Dein Name">
    <button class="btn">Spiel erstellen</button>
    <button class="btn">Beitreten</button>
  </div>

</div>

<div class="lobby fade-in">

  <div class="card">
    <h3>Lobby</h3>
  </div>

  <div class="player">Spieler 1 <span>bereit</span></div>
  <div class="player">Spieler 2 <span>bereit</span></div>

  <button class="btn">Spiel starten</button>

</div>

</body>
</html>
