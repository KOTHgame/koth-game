<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="theme-color" content="#050810">
<title>👑 KOTH</title>
<script src="/socket.io/socket.io.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --bg:#06080f;
  --card:#0f1623;
  --card2:#141d2e;
  --border:rgba(255,255,255,.06);
  --border2:rgba(255,255,255,.12);
  --gold:#f5c518;
  --gold2:#ffe566;
  --green:#22c55e;
  --red:#ef4444;
  --blue:#3b82f6;
  --purple:#a855f7;
  --text:#f1f5f9;
  --muted:#64748b;
  --muted2:#94a3b8;
  --r:16px;
  --r2:12px;
}

html,body{width:100%;min-height:100%;background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;overflow-x:hidden;}

/* BG layers */
.bg-img{position:fixed;inset:0;z-index:0;opacity:.08;background-size:cover;background-position:center;pointer-events:none;}
.bg-glow{position:fixed;inset:0;z-index:0;pointer-events:none;
  background:
    radial-gradient(ellipse 80% 60% at 10% 5%,rgba(245,197,24,.12),transparent 55%),
    radial-gradient(ellipse 60% 50% at 90% 95%,rgba(59,130,246,.1),transparent 55%),
    radial-gradient(ellipse 50% 40% at 50% 50%,rgba(168,85,247,.06),transparent 65%),
    radial-gradient(ellipse 40% 30% at 80% 20%,rgba(239,68,68,.05),transparent 50%);}

#app{position:relative;z-index:1;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:12px 12px env(safe-area-inset-bottom,24px);}
.page{width:100%;max-width:480px;padding-bottom:40px;}
.page>*{animation:fadeUp .3s ease both;}
.page>*:nth-child(2){animation-delay:.04s}
.page>*:nth-child(3){animation-delay:.08s}
.page>*:nth-child(4){animation-delay:.12s}
.page>*:nth-child(5){animation-delay:.16s}

@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes popIn{from{transform:scale(.85);opacity:0}to{transform:scale(1);opacity:1}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes cdbounce{0%{transform:scale(1.5);opacity:0}60%{transform:scale(.95)}100%{transform:scale(1);opacity:1}}
@keyframes wiggle{0%,100%{transform:rotate(0)}25%{transform:rotate(-3deg)}75%{transform:rotate(3deg)}}
@keyframes slideIn{from{transform:translateX(-12px);opacity:0}to{transform:none;opacity:1}}
@keyframes dots{0%{content:''}25%{content:'.'}50%{content:'..'}75%{content:'...'}}

/* ── TYPOGRAPHY ── */
.heading{
  font-family:'Bebas Neue',cursive;
  font-size:clamp(42px,10vw,72px);
  letter-spacing:3px;line-height:.95;
  background:linear-gradient(135deg,#f5c518 0%,#ffe566 40%,#ff9f00 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  filter:drop-shadow(0 0 30px rgba(245,197,24,.25));
}
.sub{font-size:11px;color:var(--muted);letter-spacing:2.5px;text-transform:uppercase;}
.label{font-size:10px;font-weight:800;letter-spacing:2px;color:var(--muted);text-transform:uppercase;margin-bottom:6px;}
.ph-title{font-family:'Bebas Neue',cursive;font-size:18px;letter-spacing:2px;}

/* ── CARDS ── */
.card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:var(--r);
  padding:18px;
  margin-bottom:12px;
  backdrop-filter:blur(4px);
}
.card-glass{
  background:rgba(15,22,35,.7);
  border:1px solid rgba(255,255,255,.08);
  border-radius:var(--r);
  padding:18px;
  margin-bottom:12px;
  backdrop-filter:blur(12px);
}

/* ── INPUTS ── */
.inp{
  width:100%;padding:13px 16px;
  background:rgba(255,255,255,.04);
  border:1.5px solid rgba(255,255,255,.08);
  border-radius:var(--r2);
  color:var(--text);font-family:'DM Sans',sans-serif;font-size:16px;
  outline:none;transition:border-color .2s,background .2s;margin-bottom:10px;
}
.inp:focus{border-color:var(--gold);background:rgba(245,197,24,.04);}
.inp::placeholder{color:var(--muted);}

/* ── BUTTONS ── */
.btn{
  width:100%;padding:14px 20px;border:none;border-radius:var(--r2);
  font-family:'DM Sans',sans-serif;font-weight:700;font-size:14px;letter-spacing:.5px;
  cursor:pointer;transition:transform .12s,box-shadow .12s,opacity .12s;
  margin-bottom:8px;display:flex;align-items:center;justify-content:center;gap:8px;
  position:relative;overflow:hidden;
}
.btn::after{content:'';position:absolute;inset:0;background:rgba(255,255,255,0);transition:background .15s;}
.btn:hover::after{background:rgba(255,255,255,.06);}
.btn:active{transform:scale(.97);}
.btn:disabled{opacity:.3;cursor:not-allowed;transform:none!important;}

.btn-gold{
  background:linear-gradient(135deg,#f5c518,#e6a800);
  color:#000;font-weight:900;font-size:15px;
  box-shadow:0 4px 20px rgba(245,197,24,.25),0 1px 0 rgba(255,255,255,.15) inset;
  border-radius:14px;padding:16px;
}
.btn-gold:hover:not(:disabled){box-shadow:0 8px 32px rgba(245,197,24,.4),0 1px 0 rgba(255,255,255,.15) inset;}

.btn-green{background:linear-gradient(135deg,#22c55e,#166534);color:#fff;box-shadow:0 4px 16px rgba(34,197,94,.2);}
.btn-ghost{background:rgba(255,255,255,.04);border:1.5px solid var(--border2);color:var(--muted2);}
.btn-ghost:hover{border-color:var(--gold);color:var(--gold);}
.btn-red{background:rgba(239,68,68,.1);border:1.5px solid rgba(239,68,68,.3);color:var(--red);}
.btn-sm{width:auto;padding:7px 14px;font-size:12px;margin-bottom:0;border-radius:8px;}

/* ── AVATAR GRID ── */
.av-grid{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin:10px 0 16px;}
.av-opt{
  width:56px;height:56px;border-radius:50%;
  border:2.5px solid rgba(255,255,255,.15);cursor:pointer;overflow:hidden;
  transition:transform .15s,border-color .15s,box-shadow .15s;flex-shrink:0;
  position:relative;
}
.av-opt svg{width:100%;height:100%;display:block;pointer-events:none;}
.av-opt:hover{transform:scale(1.1);}
.av-opt.sel{
  border-color:var(--gold);
  box-shadow:0 0 0 3px rgba(245,197,24,.25),0 4px 20px rgba(245,197,24,.35);
  animation:popIn .2s ease;
}


/* ── PHASE HEADER ── */
.ph{display:flex;align-items:center;gap:12px;margin-bottom:18px;}
.ph-icon{width:36px;height:36px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;}
.ph-badge{
  margin-left:auto;font-size:11px;font-weight:700;letter-spacing:1px;
  color:var(--muted);background:rgba(255,255,255,.05);
  border:1px solid var(--border);border-radius:20px;padding:4px 12px;white-space:nowrap;
}

/* ── CODE BOX ── */
.code-box{
  background:rgba(245,197,24,.05);
  border:1.5px solid rgba(245,197,24,.2);
  border-radius:var(--r);padding:18px 20px;
  text-align:center;cursor:pointer;margin-bottom:8px;
  transition:background .2s,border-color .2s;
  position:relative;overflow:hidden;
}
.code-box::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(90deg,transparent,rgba(245,197,24,.06),transparent);
  background-size:200% 100%;
  animation:shimmer 2.5s ease infinite;
}
.code-box:hover{background:rgba(245,197,24,.1);border-color:rgba(245,197,24,.4);}
.code-val{
  font-family:'Bebas Neue',cursive;
  font-size:clamp(34px,8vw,52px);
  letter-spacing:10px;color:var(--gold);line-height:1.1;
  position:relative;z-index:1;
}
.code-hint{text-align:center;font-size:11px;color:var(--muted);margin-bottom:16px;letter-spacing:.5px;}

/* ── PLAYER CHIPS ── */
.plist{display:flex;flex-direction:column;gap:8px;margin-bottom:14px;}
.plist-chip{
  display:flex;align-items:center;gap:12px;
  background:rgba(255,255,255,.03);
  border:1.5px solid rgba(255,255,255,.06);
  border-radius:14px;padding:10px 14px;
  transition:border-color .2s,background .2s;
  animation:slideIn .25s ease both;
}
.plist-chip.ready{border-color:rgba(34,197,94,.35);background:rgba(34,197,94,.04);}
.plist-chip.me{border-color:rgba(245,197,24,.3);}
.plist-chip.offline{opacity:.3;}
.plist-av{
  width:44px;height:44px;min-width:44px;
  border-radius:50%;overflow:hidden;flex-shrink:0;
  border:2px solid rgba(255,255,255,.12);
}
.plist-av>div{width:100%;height:100%;}
.plist-name{font-size:14px;font-weight:700;}
.plist-sub{font-size:11px;margin-top:2px;letter-spacing:.3px;}
.plist-badge{
  font-size:10px;font-weight:800;letter-spacing:.5px;
  padding:3px 9px;border-radius:20px;white-space:nowrap;
}
.badge-ready{background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.25);color:var(--green);}
.badge-wait{background:rgba(255,255,255,.04);border:1px solid var(--border);color:var(--muted);}
.badge-host{background:rgba(245,197,24,.1);border:1px solid rgba(245,197,24,.2);color:var(--gold);}
.kick-btn{
  font-size:10px;font-weight:800;color:var(--red);
  background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.2);
  border-radius:6px;padding:3px 8px;cursor:pointer;
}
.kick-btn:hover{background:rgba(239,68,68,.2);}

/* ── SETTINGS ── */
.settings-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px;}
.setting-box{
  background:rgba(255,255,255,.03);border:1px solid var(--border);
  border-radius:14px;padding:14px 8px;text-align:center;
  transition:border-color .2s;
}
.setting-box:hover{border-color:rgba(245,197,24,.2);}
.setting-box-lbl{font-size:10px;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:6px;font-weight:700;}
.setting-box-val{font-family:'Bebas Neue',cursive;font-size:28px;color:var(--gold);}
.setting-box-ctrl{display:flex;align-items:center;justify-content:center;gap:8px;margin-top:8px;}
.sctrl-btn{
  width:28px;height:28px;border-radius:8px;
  background:rgba(245,197,24,.08);border:1px solid rgba(245,197,24,.2);
  color:var(--gold);font-size:16px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:background .15s,transform .1s;
}
.sctrl-btn:hover{background:rgba(245,197,24,.2);}
.sctrl-btn:active{transform:scale(.9);}

/* ── TIMER ── */
.timer-wrap{margin-bottom:16px;}
.timer-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;}
.timer-num{font-family:'Bebas Neue',cursive;font-size:32px;color:var(--gold);transition:color .3s;}
.timer-num.warn{color:var(--red);animation:wiggle .4s ease;}
.timer-bar{height:6px;background:rgba(255,255,255,.06);border-radius:10px;overflow:hidden;}
.timer-fill{
  height:100%;border-radius:10px;
  background:linear-gradient(90deg,var(--gold),#ff9f00);
  transition:width .95s linear,background .5s;
}
.timer-fill.warn{background:linear-gradient(90deg,var(--red),#ff6600);}

/* ── QUESTION CARD ── */
.qcard{
  background:linear-gradient(135deg,rgba(245,197,24,.07),rgba(245,197,24,.02));
  border:1.5px solid rgba(245,197,24,.18);
  border-radius:var(--r);padding:22px;margin-bottom:16px;text-align:center;
  animation:popIn .3s ease both;
}
.qcat{font-size:10px;font-weight:800;letter-spacing:2px;color:var(--gold);text-transform:uppercase;margin-bottom:8px;}
.qtext{font-size:clamp(15px,3.5vw,20px);font-weight:700;line-height:1.4;}

/* ── BIG NUMBER ── */
.bnum{
  font-family:'Bebas Neue',cursive;
  font-size:clamp(72px,18vw,110px);
  color:var(--gold);text-align:center;line-height:1;
  filter:drop-shadow(0 0 24px rgba(245,197,24,.4));
  animation:cdbounce .5s cubic-bezier(.175,.885,.32,1.275) both;
}

/* ── TAGS ── */
.tag-list{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px;min-height:36px;}
.tag{
  padding:6px 12px;
  background:rgba(245,197,24,.08);border:1px solid rgba(245,197,24,.2);
  border-radius:20px;font-size:13px;font-weight:600;
  display:flex;align-items:center;gap:6px;
  animation:popIn .15s ease both;
}
.tag-x{cursor:pointer;color:var(--muted);font-size:12px;transition:color .15s;}
.tag-x:hover{color:var(--red);}
.count-badge{
  display:inline-flex;align-items:center;
  background:rgba(245,197,24,.08);border:1px solid rgba(245,197,24,.2);
  border-radius:20px;padding:5px 14px;font-size:13px;font-weight:700;color:var(--gold);
  margin-bottom:12px;
}

/* ── FLOW PILLS ── */
.flow-pill{
  display:inline-flex;align-items:center;
  background:rgba(255,255,255,.05);border:1px solid var(--border2);
  border-radius:8px;padding:5px 10px;font-size:12px;
}
.flow-arrow{color:var(--gold);font-size:16px;margin:0 6px;opacity:.8;}

/* ── PROGRESS DOTS ── */
.progress-dots{display:flex;gap:8px;justify-content:center;margin-bottom:20px;}
.dot{height:8px;border-radius:4px;transition:all .35s cubic-bezier(.175,.885,.32,1.275);}
.dot.active{background:var(--gold);width:28px;}
.dot.done{background:rgba(245,197,24,.3);width:8px;}
.dot.todo{background:rgba(255,255,255,.08);width:8px;}

/* ── SPOTLIGHT ── */
.spotlight{
  background:rgba(15,22,35,.8);
  border:1px solid rgba(255,255,255,.08);
  border-radius:var(--r);padding:22px;margin-bottom:14px;
  animation:fadeUp .25s ease both;
  backdrop-filter:blur(8px);
}

/* ── VOTE CARDS ── */
.vote-card{
  background:rgba(255,255,255,.03);border:1.5px solid rgba(255,255,255,.06);
  border-radius:var(--r2);padding:14px;margin-bottom:8px;cursor:pointer;
  transition:border-color .2s,background .2s,transform .15s;
  display:flex;align-items:center;gap:12px;
  animation:slideIn .2s ease both;
}
.vote-card:hover{border-color:rgba(168,85,247,.4);background:rgba(168,85,247,.06);transform:translateX(3px);}
.vote-card.voted{border-color:rgba(168,85,247,.5);background:rgba(168,85,247,.08);}
.vote-card .vav{width:40px;height:40px;min-width:40px;border-radius:10px;overflow:hidden;}
.vote-card .vnm{font-weight:700;font-size:14px;flex:1;}
.vote-card .vitems{font-size:12px;color:var(--muted);margin-top:2px;}

/* ── SCOREBOARD ── */
.sc-row{
  display:flex;align-items:center;gap:12px;
  background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);
  border-radius:14px;padding:12px 16px;margin-bottom:8px;
  animation:slideIn .25s ease both;
}
.sc-row.r1{
  border-color:rgba(245,197,24,.35);
  background:linear-gradient(135deg,rgba(245,197,24,.08),rgba(245,197,24,.02));
  box-shadow:0 0 20px rgba(245,197,24,.08);
}
.sc-row.r2{border-color:rgba(148,163,184,.3);}
.sc-row.r3{border-color:rgba(180,83,9,.3);}
.sc-row.me{border-color:rgba(245,197,24,.25);}
.sc-rank{font-family:'Bebas Neue',cursive;font-size:22px;width:28px;text-align:center;}
.sc-av{width:32px;height:32px;min-width:32px;border-radius:50%;overflow:hidden;border:2px solid rgba(255,255,255,.12);}
.sc-nm{font-weight:700;font-size:13px;flex:1;}
.sc-pts{font-family:'Bebas Neue',cursive;font-size:28px;color:var(--gold);}
.sc-delta{
  font-size:11px;color:var(--green);font-weight:700;
  background:rgba(34,197,94,.08);border:1px solid rgba(34,197,94,.2);
  border-radius:20px;padding:2px 8px;
}

/* ── TUTORIAL ── */
.tut-step{
  background:rgba(255,255,255,.03);border:1px solid var(--border);
  border-radius:var(--r);padding:16px;margin-bottom:10px;
  display:flex;align-items:flex-start;gap:14px;
  animation:fadeUp .3s ease both;
}
.tut-icon{font-size:26px;flex-shrink:0;margin-top:1px;}
.tut-title{font-family:'Bebas Neue',cursive;font-size:16px;letter-spacing:1.5px;margin-bottom:4px;}
.tut-desc{font-size:13px;color:var(--muted2);line-height:1.6;}

/* ── COUNTDOWN ── */
.countdown-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:75vh;}
.countdown-num{
  font-family:'Bebas Neue',cursive;
  font-size:clamp(110px,28vw,170px);
  color:var(--gold);line-height:1;
  animation:cdbounce .8s cubic-bezier(.175,.885,.32,1.275);
  filter:drop-shadow(0 0 40px rgba(245,197,24,.5));
}

/* ── START SCREEN ── */
.start-hero{text-align:center;padding:28px 0 20px;}
.start-hero .crown{font-size:50px;display:block;margin-bottom:8px;animation:float 3s ease-in-out infinite;}

/* ── LOADING ── */
#loading{
  position:fixed;inset:0;background:var(--bg);z-index:2000;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;
  transition:opacity .5s;
}
#loading.gone{opacity:0;pointer-events:none;}
.spinner{
  width:38px;height:38px;
  border:3px solid rgba(245,197,24,.15);
  border-top-color:var(--gold);
  border-radius:50%;animation:spin 1s linear infinite;
}

/* ── MENU ── */
#menu-btn{
  position:fixed;top:14px;right:14px;z-index:1000;
  width:40px;height:40px;border-radius:50%;
  background:rgba(10,15,25,.8);border:1px solid rgba(255,255,255,.1);
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  font-size:18px;color:var(--text);backdrop-filter:blur(8px);
  transition:background .15s;
}
#menu-btn:hover{background:rgba(255,255,255,.1);}
#menu-overlay{position:fixed;inset:0;z-index:999;background:rgba(0,0,0,.6);display:none;align-items:flex-end;justify-content:center;padding-bottom:env(safe-area-inset-bottom,16px);backdrop-filter:blur(4px);}
#menu-overlay.open{display:flex;}
.menu-sheet{
  width:100%;max-width:420px;
  background:rgba(12,18,30,.97);
  border-radius:22px 22px 0 0;padding:20px;
  border-top:1px solid rgba(255,255,255,.1);
  animation:fadeUp .25s ease both;
}
.menu-item{padding:14px 16px;border-radius:12px;font-size:14px;font-weight:700;cursor:pointer;margin-bottom:4px;display:flex;align-items:center;gap:12px;transition:background .15s;}
.menu-item:hover{background:rgba(255,255,255,.06);}
.menu-item.danger{color:var(--red);}

/* ── MISC ── */
#home-btn{position:fixed;top:14px;left:14px;z-index:1000;font-family:'Bebas Neue',cursive;font-size:16px;letter-spacing:2px;color:var(--gold);background:rgba(10,15,25,.8);border:1px solid rgba(245,197,24,.2);border-radius:20px;padding:7px 14px;cursor:pointer;backdrop-filter:blur(8px);transition:background .15s;}
#home-btn:hover{background:rgba(245,197,24,.1);}
#conn-banner{position:fixed;top:0;left:0;right:0;z-index:998;background:var(--red);color:#fff;font-size:13px;font-weight:700;text-align:center;padding:8px;transform:translateY(-100%);transition:transform .3s;}
#conn-banner.show{transform:translateY(0);}
#toast{position:fixed;bottom:calc(20px + env(safe-area-inset-bottom,0px));left:50%;transform:translateX(-50%);background:rgba(10,15,25,.97);border:1px solid rgba(245,197,24,.25);color:var(--gold);font-size:13px;font-weight:700;padding:10px 22px;border-radius:20px;z-index:9999;opacity:0;pointer-events:none;transition:opacity .3s;white-space:nowrap;backdrop-filter:blur(8px);}
#toast.show{opacity:1;}
.divider{height:1px;background:var(--border);margin:14px 0;}
.waiting::after{content:'';animation:dots 1.4s steps(4,end) infinite;}
.info-row{display:flex;justify-content:space-between;align-items:center;font-size:12px;color:var(--muted);padding:5px 0;}
.ready-btn{width:100%;padding:15px;border:none;border-radius:13px;font-family:'DM Sans',sans-serif;font-weight:800;font-size:14px;letter-spacing:.5px;cursor:pointer;transition:all .15s;margin-bottom:10px;display:flex;align-items:center;justify-content:center;gap:8px;}
.ready-btn.on{background:linear-gradient(135deg,#22c55e,#166534);color:white;box-shadow:0 4px 18px rgba(34,197,94,.25);}
.ready-btn.off{background:rgba(255,255,255,.04);border:1.5px solid rgba(255,255,255,.1);color:var(--muted2);}
.start-game-btn{width:100%;padding:17px;background:linear-gradient(135deg,#f5c518,#e6a800);color:#000;font-family:'DM Sans',sans-serif;font-weight:900;font-size:16px;letter-spacing:.5px;border:none;border-radius:14px;cursor:pointer;transition:all .15s;box-shadow:0 6px 24px rgba(245,197,24,.3);display:flex;align-items:center;justify-content:center;gap:8px;}
.start-game-btn:hover:not(:disabled){box-shadow:0 10px 36px rgba(245,197,24,.45);}
.start-game-btn:disabled{opacity:.3;cursor:not-allowed;}
.waiting-pill{display:flex;align-items:center;justify-content:center;gap:8px;background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:12px;padding:14px;color:var(--muted);font-size:13px;}
.lobby-code{background:rgba(245,197,24,.05);border:1.5px solid rgba(245,197,24,.2);border-radius:var(--r);padding:18px 20px;text-align:center;margin-bottom:12px;cursor:pointer;transition:all .2s;position:relative;overflow:hidden;}
.lobby-code::before{content:'';position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(245,197,24,.05),transparent);background-size:200% 100%;animation:shimmer 3s ease infinite;}
.lobby-code:hover{background:rgba(245,197,24,.1);border-color:rgba(245,197,24,.4);}
.lobby-code-val{font-family:'Bebas Neue',cursive;font-size:clamp(36px,9vw,54px);letter-spacing:10px;color:var(--gold);line-height:1.1;position:relative;}


/* ── Mobile optimizations ── */
@media(max-width:480px){
  .btn{padding:16px 20px;font-size:15px;}
  .inp{padding:15px 16px;font-size:16px;}
  .av-opt{width:52px;height:52px;}
  .av-grid{gap:6px;}
  .tag{font-size:14px;padding:7px 13px;}
  .qtext{font-size:17px;}
  .bnum{font-size:clamp(80px,20vw,110px);}
  .plist-chip{padding:12px 14px;}
  .plist-av{width:46px;height:46px;min-width:46px;}
  .thumb-row{padding:8px 12px!important;}
  .inp-row .btn{padding:14px 16px;}
  .settings-grid{gap:6px;}
  .setting-box{padding:12px 6px;}
  .sctrl-btn{width:32px;height:32px;font-size:18px;}
}
</style>
</head>

<div class="bg-glow"></div>
<div id="loading">

  <div class="spinner"></div>
  <div style="font-size:12px;color:var(--muted);">Verbinde<span class="waiting"></span></div>
</div>

</div>

// Persist token across reloads
function saveToken(t){ try{localStorage.setItem('koth_token',t);}catch(e){} }
function loadToken(){ try{return localStorage.getItem('koth_token');}catch(e){return null;} }

// ── UI helpers ──────────────────────────────────
function toast(msg,dur=2800){
  const t=$('toast'); t.textContent=msg; t.classList.add('show');
  clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove('show'),dur);
}
function copyText(t){ navigator.clipboard?.writeText(t).then(()=>toast('✅ Code kopiert!')).catch(()=>{}); }
function toggleMenu(){ $('menu-overlay').classList.toggle('open'); }
function closeMenu(){ $('menu-overlay').classList.remove('open'); }
function leaveGame(){ if(confirm('Spiel wirklich verlassen?')) location.reload(); }
function hideLoading(){ const l=$('loading'); if(l){l.classList.add('gone'); setTimeout(()=>l.remove(),500);} }

function goHome(){
  if(ROOM&&!['lobby','ended'].includes(ROOM.phase)){
    if(!confirm('Zum Startbildschirm? Das aktuelle Spiel läuft weiter.')) return;
  }
  ROOM=null; PRIV=null; listItems=[];
  showStart();
}

// Show 👑 KOTH back button only when not in active game
function updateHomeBtn(){
  const btn=$('home-btn'); if(!btn) return;
  const showIt = !ROOM || ['lobby','ended'].includes(ROOM.phase);
  btn.style.display = showIt ? 'block' : 'none';
}

// Back button
window.addEventListener('popstate',e=>{
  e.preventDefault();
  try{history.pushState({koth:true},'','');}catch(e2){}
  if(ROOM) routePhase(); else showStart();
});
window.addEventListener('beforeunload',e=>{
  if(ROOM&&!['lobby','ended'].includes(ROOM.phase)){e.preventDefault();e.returnValue='';}
});

// ── Socket ──────────────────────────────────────
const socket = io({ reconnectionAttempts:10, reconnectionDelay:1500 });

socket.on('connect',()=>{
  hideLoading();
  $('conn-banner').classList.remove('show');
  STATE.id = socket.id;
  const tok=loadToken();
  if(tok&&STATE.code){
    socket.emit('joinRoom',{code:STATE.code,name:STATE.name,avatar:STATE.avatar,token:tok});
  } else {
    if(!ROOM) showStart();
  }
});

socket.on('disconnect',()=>{
  $('conn-banner').classList.add('show');
});

socket.on('reconnect',()=>{
  $('conn-banner').classList.remove('show');
  toast('🔄 Wiederverbunden!');
});

socket.on('err',({msg})=>toast('❌ '+msg));
socket.on('kicked',()=>{ toast('❌ Du wurdest gekickt'); setTimeout(()=>location.reload(),2000); });
socket.on('promoted',({msg})=>toast('👑 '+msg));

socket.on('joined',({code,playerId,token,reconnected})=>{
  STATE.code=code; STATE.id=playerId;
  if(token){ STATE.token=token; saveToken(token); }
  if(reconnected) toast('🔄 Wiederverbunden!');
  setTimeout(()=>{ if(ROOM) routePhase(); },80);
});

socket.on('revealStep',({idx,step})=>{
  revealIdx=idx; revealStep=step;
  showSpotlight();
});

// ── roomState handler ───────────────────────────
socket.on('roomState',state=>{
  const prev = ROOM?.phase;
  const wasNull = !ROOM;
  ROOM = state;

  // Sync reveal position from server (for reconnecting guests)
  if(state.revealIdx!==undefined&&_revealStarted){
    if(state.revealIdx!==revealIdx||state.revealStep!==revealStep){
      revealIdx=state.revealIdx; revealStep=state.revealStep;
    }
  }

  if(wasNull){ routePhase(); return; }

  if(prev!==state.phase){
    listItems=[];_screenRendered=false;_revealStarted=false;
    revealIdx=state.revealIdx||0; revealStep=state.revealStep||0;
    routePhase(); return;
  }

  // Same phase – smart updates only
  if(state.phase==='lobby'){
    const pl=$('playerList');
    if(pl) updateLobbyPlayers(); else renderLobby();
    return;
  }
  if(state.phase==='question_phase'){
    if(!_screenRendered||!$('q-status')){ if(PRIV){ renderQ(); _screenRendered=!!PRIV.question; } }
    else updateQTimer();
    return;
  }
  if(state.phase==='list_phase'){
    if(!_screenRendered||!$('tag-area')){ if(PRIV){ renderList(); _screenRendered=true; } }
    else updateListTimer();
    return;
  }
  if(state.phase==='reveal'){
    // Always update ROOM.reveals so thumbsDown is fresh
    if(state.reveals) ROOM.reveals = state.reveals;
    if(!_revealStarted){ renderReveal(); return; }
    // Reveal already started → only update thumbs in-place, don't re-render
    updateThumbsInPlace(state.reveals||[]);
    return;
  }
  if(state.phase==='judge'){
    if(state.reveals) ROOM.reveals=state.reveals;
    renderJudge(); return;
  }
  if(state.phase==='scoreboard') { updateScoreTimer(); return; }
  routePhase();
});

socket.on('privateState',priv=>{
  const pA=PRIV?.answer, pQ=PRIV?.swappedQ?.id;
  PRIV=priv; if(!ROOM) return;
  const p=ROOM.phase;
  if(p==='question_phase'){
    if(!_screenRendered||!$('q-status')){ renderQ(); _screenRendered=!!priv.question; }
    else if(pA!==priv.answer) renderQ();
    else if(priv.question&&!document.querySelector('.qcard')) renderQ();
  } else if(p==='list_phase'){
    if(!_screenRendered||!$('tag-area')){ renderList(); _screenRendered=true; }
    else if(!pQ&&priv.swappedQ){ renderList(); _screenRendered=true; }
  } else if(['scoreboard','ended'].includes(p)){
    return; // don't re-render on private state for these
  } else routePhase();
});

// ── Router ──────────────────────────────────────
function routePhase(){
  if(!ROOM) return;
  _screenRendered=false;
  const p=ROOM.phase;
  _phase=p;
  if(p==='lobby')          renderLobby();
  else if(p==='countdown') renderCountdown();
  else if(p==='question_phase'){ if(PRIV){renderQ();_screenRendered=!!PRIV.question;} }
  else if(p==='list_phase'){ if(PRIV){renderList();_screenRendered=true;} }
  else if(p==='reveal')    renderReveal();
  else if(p==='scoreboard'){ renderScoreboard(); _screenRendered=true; }
  else if(p==='judge')     renderJudge();
  else if(p==='ended')     renderEnded();
}

// ── Timer-only updates (no full re-render) ───────
function updateQTimer(){
  if(!ROOM) return;
  const pct=Math.min(100,(ROOM.timer/(ROOM.answerTime||20))*100),warn=ROOM.timer<=5;
  const tn=document.querySelector('.timer-num'),tf=document.querySelector('.timer-fill');
  if(tn){tn.textContent=ROOM.timer+'s';tn.className='timer-num'+(warn?' warn':'');}
  if(tf){tf.style.width=pct+'%';tf.className='timer-fill'+(warn?' warn':'');}
  const st=$('q-status');
  if(st) st.innerHTML=ROOM.players.map(p=>`
    <div class="pchip${p.id===STATE.id?' me':''}">
      <div class="av">${getAv(p.avatar,'40px',true)}</div><div class="nm">${esc(p.name)}</div>
      <div style="font-size:12px;color:${p.hasAnswered?'var(--green)':'var(--muted)'}">${p.hasAnswered?'✅':'⏳'}</div>
    </div>`).join('');
}
function updateListTimer(){
  if(!ROOM) return;
  // Auto-submit if timer hits 1s and items exist
  if(ROOM.timer<=1&&listItems.length>0){
    const me=ROOM.players.find(p=>p.id===STATE.id);
    if(!me?.hasList) submitList();
  }
  const pct=Math.min(100,(ROOM.timer/(ROOM.listTime||60))*100),warn=ROOM.timer<=15;
  const tn=document.querySelector('.timer-num'),tf=document.querySelector('.timer-fill');
  if(tn){tn.textContent=ROOM.timer+'s';tn.className='timer-num'+(warn?' warn':'');}
  if(tf){tf.style.width=pct+'%';tf.className='timer-fill'+(warn?' warn':'');}
  const cb=document.querySelector('.count-badge');
  if(cb) cb.innerHTML=`${listItems.length} / ${PRIV?.answer||0} Einträge`;
  const st=$('list-status');
  if(st) st.innerHTML=ROOM.players.map(p=>`
    <div class="pchip${p.id===STATE.id?' me':''}">
      <div class="av">${getAv(p.avatar,'40px',true)}</div><div class="nm">${esc(p.name)}</div>
      <div style="font-size:12px;color:${p.hasList?'var(--green)':'var(--muted)'}">${p.hasList?'✅':'⏳'}</div>
    </div>`).join('');
}

function updateScoreTimer(){
  if(!ROOM) return;
  const pct=Math.min(100,(ROOM.timer/15)*100);
  const tf=document.querySelector('.timer-fill');
  if(tf) tf.style.width=pct+'%';
}

function renderAvGrid(){
  const g=$('avGrid'); if(!g) return;
  g.innerHTML=MEME_AVATARS.map(a=>`
    <div class="av-opt${STATE.avatar===a.id?' sel':''}" onclick="pickAv('${a.id}')" style="background:${a.bg};">
      ${a.svg}

    </div>`).join('');
}
function pickAv(id){ STATE.avatar=id; renderAvGrid(); }
function getAv(id,size,circle=false){
  const a=MEME_AVATARS.find(a=>a.id===id);
  if(!a) return '';
  const s=size||'100%';
  const br=circle?'50%':'10px';
  const border=circle?'border:2px solid rgba(255,255,255,.15);':'';
  return `<div style="width:${s};height:${s};border-radius:${br};overflow:hidden;background:${a.bg};flex-shrink:0;display:block;${border}">${a.svg}</div>`;
}

function createRoom(){
  const name=($('nameInp')?.value||'').trim();
  if(!name) return toast('❌ Bitte Namen eingeben');
  STATE.name=name;
  socket.emit('createRoom',{name,avatar:STATE.avatar,maxRounds:3,answerTime:20,listTime:60});
}
function joinRoom(){
  const name=($('nameInp')?.value||'').trim();
  const code=($('codeInp')?.value||'').trim().toUpperCase();
  if(!name) return toast('❌ Bitte Namen eingeben');
  if(code.length<3) return toast('❌ Code eingeben');
  STATE.name=name; STATE.code=code;
  socket.emit('joinRoom',{code,name,avatar:STATE.avatar,token:STATE.token||loadToken()});
}

  pl.innerHTML=lobbyPlayersHTML();

  if(sr) sr.textContent=ROOM.maxRounds;
  if(sa) sa.textContent=ROOM.answerTime+'s';
  if(sl) sl.textContent=ROOM.listTime+'s';

  if(startBtn){

    startBtn.innerHTML=ROOM.players.length<2?'⏳ Warte auf mehr Spieler…':'▶ SPIEL STARTEN';

}

function changeSetting(key,delta){
  if(!ROOM) return;
  const lim={maxRounds:[1,10],answerTime:[10,60],listTime:[30,120]};
  const nv=Math.max(lim[key][0],Math.min(lim[key][1],ROOM[key]+delta));
  socket.emit('updateSettings',{[key]:nv});
}
function toggleReady(){ const me=ROOM?.players.find(p=>p.id===STATE.id); socket.emit('setReady',{ready:!me?.ready}); }
function startGame(){ socket.emit('startGame'); }
function kickPlayer(id){ socket.emit('kickPlayer',{targetId:id}); }

function renderQ(){

    render(`<div style="text-align:center;padding:60px 0;"><div style="font-size:36px;margin-bottom:12px;">⏳</div><div style="color:var(--muted);font-size:14px;">Lädt<span class="waiting"></span></div></div>`);

  }
  const q=PRIV.question;
  const pct=Math.min(100,(ROOM.timer/(ROOM.answerTime||20))*100);
  const warn=ROOM.timer<=5, done=PRIV.answer!=null;
  render(`
    <div class="ph">
      <div class="ph-icon">🎯</div>
      <div><div class="sub">RUNDE ${ROOM.round} / ${ROOM.maxRounds}</div><div class="ph-title">DEINE SCHÄTZUNG</div></div>
      <div class="ph-badge">${ROOM.players.filter(p=>p.hasAnswered).length}/${ROOM.players.length} ✅</div>
    </div>
    <div class="timer-wrap">
      <div class="timer-top"><div class="sub">ZEIT</div><div class="timer-num${warn?' warn':''}">${ROOM.timer}s</div></div>
      <div class="timer-bar"><div class="timer-fill${warn?' warn':''}" style="width:${pct}%"></div></div>
    </div>
    <div class="qcard">
      <div class="qcat">${esc(q.cat)}${q.diff==='hard'?' · <span style="color:var(--red);animation:pulse 1.5s ease-in-out infinite;">🔥 SCHWER</span>':q.diff==='medium'?' · <span style="color:var(--gold);">⚡ MITTEL</span>':''}</div>
      <div class="qtext">${esc(q.text)}</div>
    </div>
    ${done?`
      <div style="text-align:center;padding:18px 0;">
        <div class="bnum">${esc(String(PRIV.answer))}</div>
        <div style="color:var(--muted);font-size:13px;margin-top:8px;">Gespeichert ✅ – Warte auf andere<span class="waiting"></span></div>
      </div>
    `:`
      <div class="card">
        <div class="label">WIE VIELE KANNST DU NENNEN?</div>
        <input class="inp" id="numInp" type="number" min="1" max="500" placeholder="z.B. 10 (min. 3)"
          onkeydown="if(event.key==='Enter')submitAnswer()"
          style="font-size:28px;font-weight:700;text-align:center;letter-spacing:2px;">
        <button class="btn btn-gold" onclick="submitAnswer()">📤 ABSENDEN</button>
      </div>
    `}
    <div id="q-status" style="margin-top:14px;">
      ${ROOM.players.map(p=>`<div class="pchip${p.id===STATE.id?' me':''}"><div class="av">${getAv(p.avatar,'40px',true)}</div><div class="nm">${esc(p.name)}</div><div style="font-size:12px;color:${p.hasAnswered?'var(--green)':'var(--muted)'}">${p.hasAnswered?'✅':'⏳'}</div></div>`).join('')}
    </div>
  `);

}
function submitAnswer(){
  const v=parseInt($('numInp')?.value);
  if(!v||v<3) return toast('❌ Mindestens 3 eingeben');
  socket.emit('submitAnswer',{value:v});
}

    </div>
    <div class="timer-wrap">
      <div class="timer-top"><div class="sub">VERBLEIBEND</div><div class="timer-num${warn?' warn':''}">${ROOM.timer}s</div></div>

      </div>
      <div style="text-align:center;font-size:11px;color:var(--muted);margin-top:8px;">Deine Zahl bleibt – Frage hat gewechselt!</div>
    </div>
    <div class="qcard" style="background:rgba(59,130,246,.06);border-color:rgba(59,130,246,.25);padding:14px 16px;">
      <div class="qcat" style="color:var(--blue);">${esc(PRIV.swappedQ?.cat)}</div>
      <div class="qtext">${esc(PRIV.swappedQ?.text)}</div>
    </div>
    ${done?`
      <div class="card" style="text-align:center;padding:20px;">
        <div style="font-size:28px;margin-bottom:8px;">✅</div>
        <div style="font-weight:700;">${PRIV.list?.length||0} Einträge abgeschickt!</div>
        <div style="color:var(--muted);font-size:13px;margin-top:4px;">Warte auf andere<span class="waiting"></span></div>
      </div>
    `:`
      <div class="count-badge" id="count-badge">${listItems.length} / ${target} Einträge</div>
      <div class="inp-row" style="margin-bottom:8px;">
        <input class="inp" id="listInp" placeholder="Eintrag tippen…" maxlength="40" autocomplete="off"
          onkeydown="if(event.key==='Enter')addItem()">
        <button class="btn btn-gold btn-sm" onclick="addItem()">+</button>
      </div>
      <div class="tag-list" id="tag-area">
        ${listItems.map((item,i)=>`<div class="tag">${esc(item)}<span class="tag-x" onclick="removeItem(${i})">✕</span></div>`).join('')}
      </div>
      <button class="btn btn-green" id="submit-list-btn" onclick="submitList()" ${listItems.length===0?'disabled':''}>
        ✅ ABSCHICKEN (${listItems.length})
      </button>
    `}
    <div id="list-status" style="margin-top:14px;">
      ${ROOM.players.map(p=>`<div class="pchip${p.id===STATE.id?' me':''}"><div class="av">${getAv(p.avatar,'40px',true)}</div><div class="nm">${esc(p.name)}</div><div style="font-size:12px;color:${p.hasList?'var(--green)':'var(--muted)'}">${p.hasList?'✅':'⏳'}</div></div>`).join('')}
    </div>
  `);
  if(!done) setTimeout(()=>$('listInp')?.focus(),80);
}
function addItem(){
  const inp=$('listInp'); if(!inp) return;
  const v=inp.value.trim(); if(!v) return;
  if(v.length<2) return toast('⚠️ Mind. 2 Zeichen');
  if(listItems.map(x=>x.toLowerCase()).includes(v.toLowerCase())){toast('⚠️ Schon in der Liste');inp.value='';return;}
  listItems.push(v); inp.value='';
  updateTagArea();
  setTimeout(()=>$('listInp')?.focus(),40);
}
function removeItem(i){ listItems.splice(i,1); updateTagArea(); }
function updateTagArea(){
  const ta=$('tag-area'),cb=$('count-badge'),btn=$('submit-list-btn');
  if(ta) ta.innerHTML=listItems.map((item,i)=>`<div class="tag">${esc(item)}<span class="tag-x" onclick="removeItem(${i})">✕</span></div>`).join('');
  if(cb) cb.innerHTML=`${listItems.length} / ${PRIV?.answer||0} Einträge`;
  if(btn){btn.disabled=listItems.length===0;btn.innerHTML=`✅ ABSCHICKEN (${listItems.length})`;}
}
function submitList(){
  if(!listItems.length) return toast('❌ Mind. 1 Eintrag');
  socket.emit('submitList',{items:listItems});
  listItems=[];
}

// ═══════════════════════════════════════════════
//  PHASE 3 – REVEAL (Spotlight, host controls all)
// ═══════════════════════════════════════════════
function renderReveal(){
  if(!ROOM||!ROOM.reveals) return;
  if(!_revealStarted){
    _revealStarted=true;
    revealIdx=ROOM.revealIdx||0;
    revealStep=ROOM.revealStep||0;
    showSpotlight();
  }
  // Don't re-render while user clicking through
}

function showSpotlight(){
  const reveals=ROOM?.reveals||[];
  const total=reveals.length, isHost=ROOM?.hostId===STATE.id;

  if(revealIdx>=total){
    // All players revealed → host triggers scoring immediately
    if(isHost){
      socket.emit('skipReveal');
    }
    render(`
      <div style="text-align:center;padding:50px 0;">
        <div style="font-size:48px;margin-bottom:12px;">📊</div>
        <div class="ph-title">AUSWERTUNG LÄUFT…</div>
        <div style="color:var(--muted);font-size:13px;margin-top:8px;"><span class="waiting"></span></div>
        ${isHost?`<button class="btn btn-gold" onclick="socket.emit('skipReveal')" style="margin-top:16px;max-width:260px;">JETZT AUSWERTEN →</button>`:''}
      </div>`);
    return;
  }

  const r=reveals[revealIdx];
  const dots=[0,1,2,3].map(s=>`<div class="dot ${s===revealStep?'active':s<revealStep?'done':'todo'}"></div>`).join('');
  const weiter=isHost
    ?`<button class="btn btn-gold" onclick="hostNextSpot()" style="animation:fadeUp .2s ease both;">{T}</button>`
    :`<div style="text-align:center;color:var(--muted);font-size:13px;padding:14px 0;">Warte auf Host<span class="waiting"></span></div>`;

  let content='';
  if(revealStep===0){
    content=`
      <div class="spotlight">
        <div class="sub" style="text-align:center;margin-bottom:8px;">DIE URSPRÜNGLICHE FRAGE WAR…</div>
        <div class="qcard" style="margin-bottom:0;"><div class="qcat">${esc(r.origQ?.cat)}</div><div class="qtext">${esc(r.origQ?.text)}</div></div>
        ${r.playerId===STATE.id?`<div style="text-align:center;margin-top:10px;font-size:13px;color:var(--gold);">👆 Das war DEINE Frage!</div>`:''}
      </div>
      ${weiter.replace('{T}','WEITER →')}`;
  } else if(revealStep===1){
    content=`
      <div class="spotlight" style="text-align:center;">
        <div class="sub" style="margin-bottom:10px;">UND ${esc(r.name.toUpperCase())} DACHTE…</div>
        <div class="bnum">${r.answer}</div>
        ${r.playerId===STATE.id?`<div style="font-size:13px;color:var(--gold);margin-top:8px;">Das warst du 😅</div>`:''}
      </div>
      ${weiter.replace('{T}','WEITER →')}`;
  } else if(revealStep===2){
    content=`
      <div class="spotlight">
        <div class="sub" style="text-align:center;margin-bottom:8px;">ABER DIE NEUE FRAGE WAR…</div>
        <div class="qcard" style="background:rgba(59,130,246,.07);border-color:rgba(59,130,246,.3);margin-bottom:10px;">
          <div class="qcat" style="color:var(--blue);">${esc(r.swappedQ?.cat)}</div>
          <div class="qtext">${esc(r.swappedQ?.text)}</div>
        </div>
        <div style="text-align:center;font-size:14px;color:var(--muted);">Also musste <strong style="color:var(--gold);">${esc(r.name)}</strong> genau <strong style="color:var(--gold);">${r.answer}</strong> davon nennen 😬</div>
      </div>
      ${weiter.replace('{T}','ANTWORTEN ZEIGEN →')}`;
  } else {
    const few=r.listCount<r.answer;
    const emoji=r.listCount===0?'💀':few?'😅':'😎';
    const otherCount=ROOM.players.length-1;
    const canThumb=r.playerId!==STATE.id; // can't judge own list
    const thumbsDown=r.thumbsDown||{};
    const itemsHTML=r.list.length>0?r.list.map((item,i)=>{
      const downVotes=Object.keys(thumbsDown[i]||{}).length;
      const iRejected=downVotes>=otherCount&&otherCount>0;
      const iVoted=!!(thumbsDown[i]?.[STATE.id]);
      return`<div class="thumb-row" style="display:flex;align-items:center;gap:8px;padding:6px 10px;background:rgba(255,255,255,.04);border-radius:10px;border:1px solid ${iRejected?'rgba(239,68,68,.3)':'rgba(255,255,255,.06)'};">
        <div style="flex:1;font-size:13px;font-weight:600;${iRejected?'opacity:.35;text-decoration:line-through;color:var(--red);':'color:var(--text);'}">${esc(item)}</div>
        ${canThumb?`<div onclick="thumbDown('${r.playerId}',${i})" style="display:flex;align-items:center;gap:4px;cursor:pointer;padding:4px 8px;border-radius:8px;background:${iVoted?'rgba(239,68,68,.2)':'rgba(255,255,255,.05)'};border:1px solid ${iVoted?'rgba(239,68,68,.4)':'rgba(255,255,255,.08)'};transition:all .15s;">
          <span style="font-size:14px;">👎</span>
          <span style="font-size:11px;font-weight:700;color:${iRejected?'var(--red)':iVoted?'#ff8888':'var(--muted)'};">${downVotes}/${otherCount}</span>
        </div>`:''}
        ${iRejected?`<span style="font-size:11px;color:var(--red);font-weight:700;">✗</span>`:''}
      </div>`;
    }).join('')
    :'<div style="color:var(--red);font-size:14px;margin:8px 0;">…nichts 💀</div>';
    content=`
      <div class="spotlight">
        <div style="text-align:center;font-size:40px;margin-bottom:8px;">${emoji}</div>
        <div style="text-align:center;margin-bottom:12px;">
          <span style="color:var(--muted);font-size:13px;">Hat </span>
          <span style="font-family:'Bebas Neue',cursive;font-size:32px;color:${few?'var(--red)':'var(--green)'};">${r.listCount}</span>
          <span style="color:var(--muted);font-size:13px;"> von ${r.answer} genannt:</span>
        </div>
        ${canThumb?`<div style="font-size:11px;color:var(--muted);margin-bottom:8px;text-align:center;">👎 ablehnen – alle müssen zustimmen</div>`:'<div style="font-size:11px;color:var(--muted);margin-bottom:8px;text-align:center;">Deine eigene Liste – andere können ablehnen</div>'}
        <div class="item-list-wrap" style="display:flex;flex-direction:column;gap:4px;">
          ${itemsHTML}
        </div>
      </div>
      ${weiter.replace('{T}',revealIdx+1<total?'NÄCHSTER SPIELER →':'WEITER ZUR ÜBERPRÜFUNG →')}`;
  }

  render(`
    <div class="ph">
      <div class="ph-icon" style="width:36px;height:36px;border-radius:10px;overflow:hidden;">${getAv(r.avatar)}</div>
      <div><div class="sub">SPIELER ${revealIdx+1} / ${total}</div><div class="ph-title" style="color:var(--gold);">${esc(r.name)}</div></div>
    </div>
    <div class="progress-dots">${dots}</div>
    ${content}
  `);
}

function hostNextSpot(){
  if(ROOM?.hostId!==STATE.id) return;
  revealStep++;
  if(revealStep>3){ revealStep=0; revealIdx++; }
  socket.emit('revealStep',{idx:revealIdx,step:revealStep});
  showSpotlight();
}
function nextSpot(){ if(ROOM?.hostId===STATE.id) hostNextSpot(); }
function thumbDown(targetPlayerId,itemIdx){
  socket.emit('thumbsDown',{targetPlayerId,itemIdx});
}

function updateThumbsInPlace(reveals){
  // Find the currently displayed player's reveal
  const r=reveals[revealIdx];
  if(!r) return;
  // Only update if we're on step 3 (list display)
  if(revealStep!==3) return;
  const otherCount=(ROOM?.players?.length||1)-1;
  // Re-render just the item list without touching the whole page
  const container=document.querySelector('.spotlight .item-list-wrap');
  if(!container) return;
  const thumbsDown=r.thumbsDown||{};
  const canThumb=r.playerId!==STATE.id;
  container.innerHTML=r.list.map((item,i)=>{
    const downVotes=Object.keys(thumbsDown[i]||{}).length;
    const iRejected=downVotes>=otherCount&&otherCount>0;
    const iVoted=!!(thumbsDown[i]?.[STATE.id]);
    return`<div class="thumb-row" style="display:flex;align-items:center;gap:8px;padding:6px 10px;background:rgba(255,255,255,.04);border-radius:10px;border:1px solid ${iRejected?'rgba(239,68,68,.3)':'rgba(255,255,255,.06)'};">
      <div style="flex:1;font-size:13px;font-weight:600;${iRejected?'opacity:.35;text-decoration:line-through;color:var(--red);':'color:var(--text);'}">${esc(item)}</div>
      ${canThumb?`<div onclick="thumbDown('${r.playerId}',${i})" style="display:flex;align-items:center;gap:4px;cursor:pointer;padding:4px 8px;border-radius:8px;background:${iVoted?'rgba(239,68,68,.2)':'rgba(255,255,255,.05)'};border:1px solid ${iVoted?'rgba(239,68,68,.4)':'rgba(255,255,255,.08)'};transition:all .15s;">
        <span style="font-size:14px;">👎</span>
        <span style="font-size:11px;font-weight:700;color:${iRejected?'var(--red)':iVoted?'#ff8888':'var(--muted)'};">${downVotes}/${otherCount}</span>
      </div>`:''}
      ${iRejected?`<span style="font-size:11px;color:var(--red);font-weight:700;">✗</span>`:''}
    </div>`;
  }).join('');
}



// ═══════════════════════════════════════════════
//  PHASE JUDGE – Thumbs review with ready system
// ═══════════════════════════════════════════════
function renderJudge(){
  if(!ROOM) return;
  const isHost=ROOM.hostId===STATE.id;
  const readyIds=ROOM.judgeReadyIds||[];
  const myReady=readyIds.includes(STATE.id);
  const allReady=ROOM.players.every(p=>readyIds.includes(p.id));
  const total=ROOM.players.length;
  const readyCount=readyIds.length;

  render(`
    <div class="ph">
      <div class="ph-icon" style="font-size:22px;">👎</div>
      <div><div class="sub">AUSWERTUNG</div><div class="ph-title">WÖRTER ÜBERPRÜFEN</div></div>
      <div class="ph-badge">${readyCount}/${total} bereit</div>
    </div>
    <div style="font-size:13px;color:var(--muted2);margin-bottom:16px;text-align:center;line-height:1.6;">
      Lehnt ungültige Wörter ab – wenn <strong style="color:var(--text);">alle anderen</strong> 👎 drücken, scheidet das Wort aus.
    </div>
    ${(ROOM.judgeData||[]).map(jd=>{
      const otherCount=total-1;
      const rev=ROOM.reveals?.find(r=>r.playerId===jd.playerId);
      const thumbsDown=rev?.thumbsDown||{};
      const isOwn=jd.playerId===STATE.id;
      return`<div class="card-glass" style="margin-bottom:10px;">
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px;">
          <div style="width:36px;height:36px;border-radius:10px;overflow:hidden;">${getAv(jd.avatar,'36px',true)}</div>
          <div>
            <div style="font-weight:700;font-size:14px;">${esc(jd.name)}</div>
            <div style="font-size:11px;color:var(--muted);">${jd.validList.length} von ${jd.answer} gültig</div>
          </div>
        </div>
        <div style="display:flex;flex-direction:column;gap:4px;">
          ${jd.origList.length===0
            ?'<div style="color:var(--red);font-size:13px;padding:6px;">nichts geschrieben 💀</div>'
            :jd.origList.map((item,i)=>{
              const dv=Object.keys(thumbsDown[i]||{}).length;
              const rejected=dv>=otherCount&&otherCount>0;
              const iVoted=!!(thumbsDown[i]?.[STATE.id]);
              return`<div class="thumb-row" style="display:flex;align-items:center;gap:8px;padding:7px 10px;background:rgba(255,255,255,.03);border-radius:10px;border:1px solid ${rejected?'rgba(239,68,68,.25)':'rgba(255,255,255,.05)'};">
                <div style="flex:1;font-size:13px;font-weight:600;${rejected?'opacity:.3;text-decoration:line-through;color:var(--red);':''};">${esc(item)}</div>
                ${!isOwn?`<div onclick="thumbDown('${jd.playerId}',${i})" style="display:flex;align-items:center;gap:4px;cursor:pointer;padding:5px 10px;border-radius:8px;background:${iVoted?'rgba(239,68,68,.18)':'rgba(255,255,255,.04)'};border:1px solid ${iVoted?'rgba(239,68,68,.35)':'rgba(255,255,255,.07)'};min-width:52px;justify-content:center;transition:all .15s;">
                  <span style="font-size:15px;">👎</span>
                  <span style="font-size:12px;font-weight:700;color:${rejected?'var(--red)':iVoted?'#ff8888':'var(--muted)'};">${dv}/${otherCount}</span>
                </div>`:'<span style="font-size:11px;color:var(--muted);padding:0 4px;">dein Wort</span>'}
                ${rejected?'<span style="color:var(--red);font-size:13px;">✗</span>':''}
              </div>`;
            }).join('')}
        </div>
      </div>`;
    }).join('')}

    ${myReady
      ?`<div class="waiting-pill" style="margin-top:8px;">✅ Warte auf andere<span class="waiting"></span></div>`
      :`<button class="btn btn-green" onclick="pressJudgeReady()" style="margin-top:8px;">✅ FERTIG – BEREIT ZUR AUSWERTUNG</button>`}

    ${isHost&&allReady
      ?`<button class="start-game-btn" onclick="socket.emit('skipReveal')" style="margin-top:8px;">📊 AUSWERTUNG STARTEN →</button>`
      :isHost
        ?`<div style="text-align:center;font-size:12px;color:var(--muted);margin-top:8px;">${readyCount}/${total} bereit – warte auf alle<span class="waiting"></span></div>`
        :''}
  `);
}
function pressJudgeReady(){ socket.emit('judgeReady'); }


// ═══════════════════════════════════════════════
//  PHASE 5 – SCOREBOARD
// ═══════════════════════════════════════════════
function renderScoreboard(){
  if(!ROOM) return;
  const pct=Math.min(100,(ROOM.timer/18)*100);
  const sorted=[...ROOM.players].sort((a,b)=>b.score-a.score);
  const top3=sorted.slice(0,3);
  const rest=sorted.slice(3);
  const medals=['🥇','🥈','🥉'];
  const podiumColors=['#f5c518','#94a3b8','#b45309'];
  const podiumSizes=['72px','56px','48px'];
  const myPos=sorted.findIndex(p=>p.id===STATE.id);
  const myD=ROOM.roundScores?.[STATE.id];
  render(`
    <div class="ph">
      <div class="ph-icon">🏆</div>
      <div><div class="sub">RUNDE ${ROOM.round} / ${ROOM.maxRounds}</div><div class="ph-title">PUNKTESTAND</div></div>
    </div>
    <div class="timer-wrap"><div class="timer-bar"><div class="timer-fill" style="width:${pct}%"></div></div></div>

    <!-- Kahoot-style podium for top 3 -->
    <div style="display:flex;align-items:flex-end;justify-content:center;gap:8px;margin:20px 0 24px;">
      ${[top3[1],top3[0],top3[2]].map((p,col)=>{
        if(!p)return'<div style="flex:1"></div>';
        const realRank=[1,0,2][col]; // 1st in middle
        const h=['80px','110px','65px'][col];
        const d=ROOM.roundScores?.[p.id];
        const isMe=p.id===STATE.id;
        return`<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;animation:fadeUp .4s ease both;animation-delay:${col*.1}s">
          <div style="width:${podiumSizes[realRank]};height:${podiumSizes[realRank]};border-radius:50%;overflow:hidden;margin:0 auto;border:3px solid ${podiumColors[realRank]};box-shadow:0 0 20px ${podiumColors[realRank]}66;">${getAv(p.avatar,'100%',false)}</div>
          <div style="font-family:'Bebas Neue',cursive;font-size:13px;color:${podiumColors[realRank]};letter-spacing:1px;max-width:80px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${esc(p.name)}</div>
          <div style="font-family:'Bebas Neue',cursive;font-size:22px;color:${podiumColors[realRank]};">${p.score}</div>
          ${d?`<div style="font-size:11px;color:var(--green);font-weight:700;">+${d.total}</div>`:''}
          <div style="width:100%;height:${h};background:${podiumColors[realRank]}22;border:2px solid ${podiumColors[realRank]}44;border-bottom:none;border-radius:8px 8px 0 0;display:flex;align-items:center;justify-content:center;">
            <span style="font-size:20px;">${medals[realRank]}</span>
          </div>
        </div>`;
      }).join('')}
    </div>

    <!-- Rest of players -->
    ${rest.map((p,i)=>{
      const rank=i+4;
      const d=ROOM.roundScores?.[p.id];
      return`<div class="sc-row${p.id===STATE.id?' me':''}">
        <div class="sc-rank" style="color:var(--muted)">${rank}</div>
        <div class="sc-av" >${getAv(p.avatar,'32px',true)}</div>
        <div class="sc-nm">${esc(p.name)}${p.id===STATE.id?' <span style="color:var(--gold);font-size:11px;">(du)</span>':''}</div>
        ${d?`<div style="text-align:right;"><div class="sc-pts">${p.score}</div><div class="sc-delta">+${d.total}</div></div>`:`<div class="sc-pts">${p.score}</div>`}
      </div>`;}).join('')}

    <!-- My round breakdown -->
    ${myD?`
    <div class="card" style="margin-top:14px;border-color:rgba(245,197,24,.2);">
      <div class="label" style="margin-bottom:8px;">DEINE RUNDE</div>
      <div style="display:flex;justify-content:space-between;align-items:center;font-size:13px;">
        <span>${myD.listed} von ${myD.promised} genannt</span>
        <span style="font-family:'Bebas Neue',cursive;font-size:20px;color:var(--gold);">×${myD.mult}</span>
      </div>
      ${myD.accuracyBonus>0?`<div style="font-size:12px;color:var(--green);margin-top:4px;">🎯 Ziel erreicht! +${myD.accuracyBonus} Bonus</div>`:''}
      <div style="font-size:12px;color:var(--muted);margin-top:4px;">= ${myD.total} Punkte diese Runde</div>
    </div>`:''}

    <div style="text-align:center;color:var(--muted);font-size:13px;margin-top:10px;">
      ${ROOM.round<ROOM.maxRounds?`Nächste Runde startet<span class="waiting"></span>`:`Spiel endet<span class="waiting"></span>`}
    </div>
  `);
}

// ═══════════════════════════════════════════════
//  ENDED
// ═══════════════════════════════════════════════
function renderEnded(){
  if(!ROOM) return;
  const sorted=[...ROOM.players].sort((a,b)=>b.score-a.score);
  const winner=sorted[0],isHost=ROOM.hostId===STATE.id;
  const medals=['🥇','🥈','🥉'];
  render(`
    <div style="text-align:center;padding:28px 0 20px;">
      <div style="font-size:72px;margin-bottom:8px;" class="pulse">${winner?.id===STATE.id?'👑':'🏆'}</div>
      <div class="heading">${winner?.id===STATE.id?'DU GEWINNST!':'GAME OVER'}</div>
      <div style="display:flex;align-items:center;justify-content:center;gap:10px;margin-top:10px;"><div style="width:36px;height:36px;border-radius:10px;overflow:hidden;">${getAv(winner?.avatar,'40px',true)}</div><span style="font-size:18px;font-weight:700;color:var(--gold);">${esc(winner?.name)}</span></div>
      <div style="color:var(--muted);font-size:13px;margin-top:4px;">${winner?.score} Punkte</div>
    </div>
    <div style="margin-bottom:16px;">
      ${sorted.map((p,i)=>`
        <div class="sc-row${i===0?' r1':i===1?' r2':i===2?' r3':''}" style="animation-delay:${i*.07}s">
          <div class="sc-rank">${medals[i]||i+1}</div>
          <div class="sc-av" >${getAv(p.avatar,'32px',true)}</div>
          <div class="sc-nm">${esc(p.name)}${p.id===STATE.id?' 👈':''}</div>
          <div class="sc-pts">${p.score}</div>
        </div>`).join('')}
    </div>
    ${isHost
      ?`<button class="btn btn-gold" onclick="rematch()">🔄 NOCHMAL SPIELEN</button>`
      :`<div style="text-align:center;color:var(--muted);font-size:13px;margin-bottom:12px;">Warte auf Host für Rematch<span class="waiting"></span></div>`}
    <button class="btn btn-ghost" onclick="shareResult()" style="opacity:.8;">📤 ERGEBNIS TEILEN</button>
    <button class="btn btn-ghost" onclick="location.reload()" style="opacity:.5;font-size:12px;padding:10px;">🚪 Verlassen</button>
  `);
}
function rematch(){ socket.emit('rematch'); }
function shareResult(){
  if(!ROOM) return;
  const sorted=[...ROOM.players].sort((a,b)=>b.score-a.score);
  const lines=['👑 KING OF THE HILL – Ergebnis',''];
  sorted.forEach((p,i)=>{ lines.push(`${['🥇','🥈','🥉'][i]||i+1+'.'} ${p.name}: ${p.score} Punkte`); });
  lines.push('','Spiel: koth-game-production.up.railway.app');
  const text=lines.join('\n');
  if(navigator.share){navigator.share({text,title:'KOTH Ergebnis'}).catch(()=>{});}
  else{navigator.clipboard?.writeText(text).then(()=>toast('✅ Ergebnis kopiert!')).catch(()=>toast('📋 '+text.slice(0,60)+'...'));}
}
</script>
</body>
</html>
